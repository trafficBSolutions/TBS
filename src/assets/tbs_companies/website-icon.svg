<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <!-- Browser frame -->
  <rect x="10" y="10" width="180" height="140" rx="8" fill="#fff" stroke="#333" stroke-width="3"/>
  <!-- Title bar -->
  <rect x="10" y="10" width="180" height="28" rx="8" fill="#444"/>
  <rect x="10" y="30" width="180" height="8" fill="#444"/>
  <!-- Traffic light dots -->
  <circle cx="28" cy="24" r="5" fill="#ff5f57"/>
  <circle cx="44" cy="24" r="5" fill="#febc2e"/>
  <circle cx="60" cy="24" r="5" fill="#28c840"/>
  <!-- URL bar -->
  <rect x="80" y="18" width="96" height="12" rx="4" fill="#666"/>
  <!-- Nav bar -->
  <rect x="20" y="46" width="160" height="8" rx="2" fill="#e67e22"/>
  <!-- Hero image placeholder -->
  <rect x="20" y="62" width="160" height="40" rx="3" fill="#f0dcc8"/>
  <text x="100" y="86" text-anchor="middle" font-size="10" font-family="Arial, sans-serif" fill="#e67e22" font-weight="bold">YOUR WEBSITE</text>
  <!-- Content blocks -->
  <rect x="20" y="110" width="48" height="30" rx="3" fill="#e8e8e8"/>
  <rect x="76" y="110" width="48" height="30" rx="3" fill="#e8e8e8"/>
  <rect x="132" y="110" width="48" height="30" rx="3" fill="#e8e8e8"/>
  <!-- Small lines in content blocks -->
  <rect x="26" y="118" width="36" height="3" rx="1" fill="#bbb"/>
  <rect x="26" y="125" width="28" height="3" rx="1" fill="#bbb"/>
  <rect x="82" y="118" width="36" height="3" rx="1" fill="#bbb"/>
  <rect x="82" y="125" width="28" height="3" rx="1" fill="#bbb"/>
  <rect x="138" y="118" width="36" height="3" rx="1" fill="#bbb"/>
  <rect x="138" y="125" width="28" height="3" rx="1" fill="#bbb"/>
</svg>
